<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market Daily | Dashboard Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/report-v2/styles.css">
</head>
<body>
  <div class="dashboard-shell">
    <aside class="side-nav" aria-label="리포트 메뉴">
      <a class="brand side-brand" href="/report-v2" aria-label="카카오뱅크 Market Daily">
        <img class="brand-logo brand-logo-full" src="/report-v2/kakaobank-signature.svg" alt="카카오뱅크" />
        <img class="brand-logo brand-logo-mark" src="/report-v2/kakaobank-symbol.svg" alt="" aria-hidden="true" />
      </a>

      <nav class="side-menu" aria-label="주요 메뉴">
        <button class="side-menu-item side-menu-button active" type="button" data-view-target="overview">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 13h5V4H4v9Zm0 7h5v-5H4v5Zm7 0h9v-9h-9v9Zm0-16v5h9V4h-9Z"/></svg>
          </span>
          <span>Overview</span>
        </button>
        <button class="side-menu-item side-menu-button" type="button" data-view-target="trend">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 19h16v2H4v-2Zm1-3 4-5 4 3 5-8 2 1.2-6.4 10.2-4.2-3.2L6.6 18 5 16Z"/></svg>
          </span>
          <span>Trend</span>
        </button>
        <button class="side-menu-item side-menu-button" id="chatToggleNav" type="button">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M20 15.5c0 1.1-.6 2.1-1.5 2.6L12 21l-6.5-2.9A3 3 0 0 1 4 15.5v-8A3.5 3.5 0 0 1 7.5 4h9A3.5 3.5 0 0 1 20 7.5v8ZM8 11a1.2 1.2 0 1 0 0-2.4A1.2 1.2 0 0 0 8 11Zm4 0a1.2 1.2 0 1 0 0-2.4A1.2 1.2 0 0 0 12 11Zm4 0a1.2 1.2 0 1 0 0-2.4A1.2 1.2 0 0 0 16 11Z"/></svg>
          </span>
          <span>AI</span>
        </button>
      </nav>
    </aside>

    <div class="dashboard-main">
      <nav class="topnav" id="topnav">
        <div class="topnav-inner">
          <div class="topnav-dates" id="datePicker" aria-label="날짜 선택"></div>
        </div>
      </nav>

      <section class="view-panel active" id="overviewView" data-view="overview">
        <header class="hero-band" id="hero">
          <div class="hero-inner">
            <div class="hero-copy">
              <div class="hero-meta">
                <span class="hero-date" id="heroDate">로딩 중...</span>
                <span class="hero-sep">·</span>
                <span class="hero-author" id="heroAuthor">자금운용본부</span>
              </div>
              <h1 class="hero-title">Market Daily</h1>
              <p class="hero-comment" id="heroComment"></p>
            </div>
          </div>
        </header>

        <section class="brief-board" id="briefBoard" aria-label="데일리 브리프"></section>
        <section class="market-charts" id="marketCharts" aria-label="시장 추이"></section>

        <main class="report-body" id="reportBody">
          <div class="report-loading" id="reportLoading">
            <div class="loading-spinner"></div>
            <p>리포트를 불러오는 중...</p>
          </div>
          <div class="report-grid" id="reportGrid" hidden></div>
        </main>
      </section>

      <section class="view-panel trend-workspace" id="trendView" data-view="trend" hidden aria-label="상세 트렌드"></section>
    </div>
  </div>

  <div class="chat-overlay" id="chatOverlay" hidden></div>
  <aside class="chat-panel" id="chatPanel" hidden aria-label="AI 분석 채팅">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 10c0 .74-.4 1.41-1 1.73L8 14l-5-2.27A2 2 0 0 1 2 10V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6z"/></svg>
        </div>
        <div>
          <div class="chat-header-title">AI 시장 분석</div>
          <div class="chat-header-sub" id="chatContextLabel">오늘 데이터 기반</div>
        </div>
      </div>
      <button class="chat-close" id="chatClose" type="button" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/></svg>
      </button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="chat-message assistant">
        <div class="chat-bubble">
          <p>오늘 시장 데이터를 기준으로 질문해보세요.</p>
          <p>필요하면 지표와 차트 형태로 함께 정리합니다.</p>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-suggestions" id="chatSuggestions">
        <button class="suggestion-chip" data-q="KOSPI 최근 5일 추이를 차트로 보여줘">KOSPI 5일 추이</button>
        <button class="suggestion-chip" data-q="오늘 주요 지표를 표로 정리해줘">주요 지표 요약</button>
        <button class="suggestion-chip" data-q="미국 금리와 KOSPI의 관계를 분석해줘">금리·주식 관계</button>
        <button class="suggestion-chip" data-q="외국인 매매 동향을 분석해줘">외국인 동향</button>
      </div>
      <div class="chat-input-row">
        <textarea id="chatInput" class="chat-textarea" placeholder="시장에 대해 질문하세요... (Shift+Enter 줄바꿈)" rows="1" aria-label="질문 입력"></textarea>
        <button class="chat-send" id="chatSend" type="button" aria-label="전송">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="14" y1="2" x2="2" y2="8"/><line x1="14" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="8" y2="14"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <button class="chat-fab" id="chatFab" type="button" aria-label="AI 분석 열기">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 12c0 .93-.5 1.77-1.25 2.17L10 17.5l-6.75-3.33A2.5 2.5 0 0 1 2 12V5a2.5 2.5 0 0 1 2.5-2.5h11A2.5 2.5 0 0 1 18 5v7z"/><circle cx="7.5" cy="8.5" r="1.25" fill="currentColor" stroke="none"/><circle cx="10" cy="8.5" r="1.25" fill="currentColor" stroke="none"/><circle cx="12.5" cy="8.5" r="1.25" fill="currentColor" stroke="none"/></svg>
    <span>AI 분석</span>
  </button>

  <script type="module" src="/report-v2/app.js"></script>
</body>
</html>
