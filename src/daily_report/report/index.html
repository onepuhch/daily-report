<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market Daily — 자금운용본부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/report/styles.css">
</head>
<body>

  <!-- Top Nav -->
  <nav class="topnav" id="topnav">
    <div class="topnav-inner">
      <a class="brand" href="/report">
        <div class="brand-mark">MD</div>
        <span class="brand-name">Market Daily</span>
      </a>
      <div class="topnav-dates" id="datePicker" aria-label="날짜 선택"></div>
      <div class="topnav-right">
        <a class="btn-ghost topnav-admin" href="/admin" target="_blank" rel="noreferrer">관리자</a>
        <button class="btn-primary topnav-chat" id="chatToggleNav" type="button">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 10c0 .74-.4 1.41-1 1.73L8 14l-5-2.27A2 2 0 0 1 2 10V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6z"/><circle cx="6" cy="7" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="7" r="1" fill="currentColor" stroke="none"/><circle cx="10" cy="7" r="1" fill="currentColor" stroke="none"/></svg>
          AI 분석
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Band -->
  <header class="hero-band" id="hero">
    <div class="hero-inner">
      <div class="hero-meta">
        <span class="hero-date" id="heroDate">로딩 중...</span>
        <span class="hero-sep">·</span>
        <span class="hero-author" id="heroAuthor">자금운용본부</span>
      </div>
      <h1 class="hero-title">Market Daily</h1>
      <p class="hero-comment" id="heroComment"></p>
      <div class="hero-tickers" id="heroTickers"></div>
    </div>
  </header>

  <!-- Report Body -->
  <main class="report-body" id="reportBody">
    <div class="report-loading" id="reportLoading">
      <div class="loading-spinner"></div>
      <p>리포트를 불러오는 중...</p>
    </div>
    <div class="report-grid" id="reportGrid" hidden></div>
  </main>

  <!-- Chat Panel (slide-in from right) -->
  <div class="chat-overlay" id="chatOverlay" hidden></div>
  <aside class="chat-panel" id="chatPanel" hidden aria-label="AI 분석 챗봇">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 10c0 .74-.4 1.41-1 1.73L8 14l-5-2.27A2 2 0 0 1 2 10V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6z"/></svg>
        </div>
        <div>
          <div class="chat-header-title">AI 시장 분석</div>
          <div class="chat-header-sub" id="chatContextLabel">오늘의 데이터 기반</div>
        </div>
      </div>
      <button class="chat-close" id="chatClose" type="button" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/></svg>
      </button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="chat-message assistant">
        <div class="chat-bubble">
          <p>안녕하세요. 오늘의 시장 데이터를 기반으로 분석 질문을 해보세요.</p>
          <p>차트나 표가 필요한 경우 함께 보여드립니다.</p>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-suggestions" id="chatSuggestions">
        <button class="suggestion-chip" data-q="KOSPI 지난 5일 추이를 차트로 보여줘">KOSPI 5일 추이</button>
        <button class="suggestion-chip" data-q="오늘 주요 지표를 표로 정리해줘">주요 지표 요약</button>
        <button class="suggestion-chip" data-q="미국 금리와 KOSPI의 관계를 분석해줘">금리·주식 관계</button>
        <button class="suggestion-chip" data-q="외국인 매매 동향을 분석해줘">외국인 동향</button>
      </div>
      <div class="chat-input-row">
        <textarea id="chatInput" class="chat-textarea" placeholder="시장에 대해 질문하세요... (Shift+Enter 줄바꿈)" rows="1" aria-label="질문 입력"></textarea>
        <button class="chat-send" id="chatSend" type="button" aria-label="전송">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="14" y1="2" x2="2" y2="8"/><line x1="14" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="8" y2="14"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Floating chat button -->
  <button class="chat-fab" id="chatFab" type="button" aria-label="AI 분석 열기">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 12c0 .93-.5 1.77-1.25 2.17L10 17.5l-6.75-3.33A2.5 2.5 0 0 1 2 12V5a2.5 2.5 0 0 1 2.5-2.5h11A2.5 2.5 0 0 1 18 5v7z"/><circle cx="7.5" cy="8.5" r="1.25" fill="currentColor" stroke="none"/><circle cx="10" cy="8.5" r="1.25" fill="currentColor" stroke="none"/><circle cx="12.5" cy="8.5" r="1.25" fill="currentColor" stroke="none"/></svg>
    <span>AI 분석</span>
  </button>

  <script type="module" src="/report/app.js"></script>
</body>
</html>
