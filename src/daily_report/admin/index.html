<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Report Admin</title>
    <link rel="stylesheet" href="/admin/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-mark">DR</div>
          <div>
            <h1>Daily Report</h1>
            <p>Admin</p>
          </div>
        </div>
        <div class="sidebar-section">
          <div class="section-label">Reports</div>
          <div id="reportList" class="report-list"></div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Market Daily</p>
            <h2 id="reportTitle">리포트를 불러오는 중</h2>
          </div>
          <div class="topbar-actions">
            <a id="previewLink" class="button secondary" href="#" target="_blank" rel="noreferrer">HTML 미리보기</a>
            <button id="refreshButton" class="button ghost" type="button">새로고침</button>
          </div>
        </header>

        <section class="summary-strip" aria-label="report summary">
          <div>
            <span class="summary-label">Date</span>
            <strong id="summaryDate">-</strong>
          </div>
          <div>
            <span class="summary-label">Metrics</span>
            <strong id="summaryCount">-</strong>
          </div>
          <div>
            <span class="summary-label">Generated</span>
            <strong id="summaryGenerated">-</strong>
          </div>
          <div>
            <span class="summary-label">Status</span>
            <strong id="summaryStatus">draft</strong>
          </div>
        </section>

        <div class="content-grid">
          <section class="data-pane">
            <div class="pane-header">
              <div>
                <p class="eyebrow">Numbers</p>
                <h3>시장 데이터</h3>
              </div>
              <div id="categoryTabs" class="category-tabs"></div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>지표</th>
                    <th>값</th>
                    <th>1D</th>
                    <th>YTD</th>
                    <th>출처</th>
                  </tr>
                </thead>
                <tbody id="metricRows"></tbody>
              </table>
            </div>
          </section>

          <aside class="comment-pane">
            <div class="pane-header compact">
              <div>
                <p class="eyebrow">Review</p>
                <h3>코멘트</h3>
              </div>
              <select id="statusInput" aria-label="status">
                <option value="draft">draft</option>
                <option value="reviewed">reviewed</option>
                <option value="published">published</option>
              </select>
            </div>

            <label class="field">
              <span>자동 코멘트 초안</span>
              <textarea id="autoCommentInput" rows="5" placeholder="나중에 AI가 작성한 초안이 들어갈 영역입니다. 지금은 비워둬도 됩니다."></textarea>
            </label>
            <button id="draftButton" class="button secondary full-width" type="button">숫자로 자동 초안 생성</button>

            <label class="field">
              <span>참고 메모</span>
              <textarea id="referenceInput" rows="6" placeholder="텔레그램, 뉴스, 내부 메모 등 코멘트 작성에 참고한 내용을 붙여 넣습니다."></textarea>
            </label>

            <label class="field">
              <span>최종 코멘트</span>
              <textarea id="finalCommentInput" rows="8" placeholder="실제 리포트에 들어갈 최종 문장을 작성합니다."></textarea>
            </label>

            <button id="saveButton" class="button primary" type="button">저장 SQL 생성</button>
            <button id="uploadButton" class="button secondary full-width" type="button">Supabase에 직접 저장</button>
            <p id="saveMessage" class="save-message" role="status"></p>

            <label class="field sql-field">
              <span>Supabase SQL</span>
              <textarea id="sqlOutput" rows="9" readonly></textarea>
            </label>
          </aside>
        </div>
      </main>
    </div>

    <script src="/admin/app.js"></script>
  </body>
</html>
